<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel - The New West</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 40px; }

        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .header-title h1 { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .header-title p { color: #64748b; margin-top: 5px; }

        /* --- TABS --- */
        .tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
        .tab { padding: 12px 5px; cursor: pointer; color: #64748b; font-weight: 500; display: flex; align-items: center; gap: 8px; position: relative; }
        .tab.active { color: var(--primary-blue); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary-blue); }

        /* --- LAYOUT --- */
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .card { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; height: fit-content; }
        .card h2 { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* --- FORM --- */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: #fdfdfd; font-size: 0.9rem; }
        textarea { height: 100px; resize: none; }

        .btn-publish { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-publish:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- LIST --- */
        .post-list { display: flex; flex-direction: column; gap: 15px; }
        .post-item { border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .post-info h3 { font-size: 0.95rem; margin-bottom: 3px; }
        .post-info p { font-size: 0.85rem; color: #64748b; }
        .post-meta { font-size: 0.7rem; color: #94a3b8; font-weight: 700; margin-top: 5px; }
        .btn-delete { color: #cbd5e1; cursor: pointer; transition: 0.3s; border: none; background: none; font-size: 1rem; }
        .btn-delete:hover { color: #ef4444; }

        .content-section { display: none; }
        .content-section.active { display: grid; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Panel de Administración</h1>
            <p>Gestiona el contenido de la frontera desde un solo lugar.</p>
        </div>
        <button class="btn-publish" style="width: auto; padding: 8px 16px;" onclick="location.href='../index.html'">Volver a la Web</button>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(event, 'noticias')"><i class="far fa-newspaper"></i> Noticias</div>
        <div class="tab" onclick="switchTab(event, 'eventos')"><i class="far fa-calendar-alt"></i> Eventos</div>
        <div class="tab" onclick="switchTab(event, 'staff')"><i class="far fa-user"></i> Staff</div>
        <div class="tab" onclick="switchTab(event, 'lore-admin')"><i class="fas fa-book"></i> Cronología</div>
    </div>

    <!-- SECCIÓN NOTICIAS -->
    <div id="noticias" class="content-section active main-content">
        <div class="card">
            <h2><i class="fas fa-plus"></i> Nueva Noticia</h2>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="newsTitle" placeholder="Título de la noticia">
            </div>
            <div class="form-group">
                <label>Contenido</label>
                <textarea id="newsContent" placeholder="Contenido de la noticia..."></textarea>
            </div>
            <button class="btn-publish" id="btn-save-news">Publicar Noticia</button>
        </div>
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> Noticias Publicadas</h2>
            <div id="newsList" class="post-list"></div>
        </div>
    </div>

    <!-- SECCIÓN EVENTOS -->
    <div id="eventos" class="content-section main-content">
        <div class="card">
            <h2><i class="fas fa-calendar-plus"></i> Nuevo Evento</h2>
            <div class="form-group">
                <label>Nombre del Evento</label>
                <input type="text" id="eventTitle" placeholder="Ej: Duelo al Sol">
            </div>
            <div class="form-group">
                <label>Fecha y Detalles</label>
                <textarea id="eventContent" placeholder="Indica fecha, hora y descripción..."></textarea>
            </div>
            <button class="btn-publish" id="btn-save-event">Programar Evento</button>
        </div>
        <div class="card">
            <h2><i class="fas fa-history"></i> Eventos en Agenda</h2>
            <div id="eventsList" class="post-list"></div>
        </div>
    </div>

    <!-- SECCIÓN STAFF -->
    <div id="staff" class="content-section main-content">
        <div class="card">
            <h2><i class="fas fa-user-plus"></i> Nuevo Miembro</h2>
            <div class="form-group">
                <label>Nombre / Nickname</label>
                <input type="text" id="staffName" placeholder="Nombre del usuario">
            </div>
            <div class="form-group">
                <label>Rango o Frase</label>
                <input type="text" id="staffRange" placeholder="Ej: Sheriff, Admin, Mod">
            </div>
            <div class="form-group">
                <label>Discord Tag (Opcional)</label>
                <input type="text" id="staffDiscord" placeholder="Usuario#0000">
            </div>
            <button class="btn-publish" id="btn-save-staff">Agregar al Staff</button>
        </div>
        <div class="card">
            <h2><i class="fas fa-users-cog"></i> Equipo Actual</h2>
            <div id="staffList" class="post-list"></div>
        </div>
    </div>

    <!-- SECCIÓN LORE -->
    <div id="lore-admin" class="content-section main-content">
        <div class="card">
            <h2><i class="fas fa-feather-alt"></i> Nuevo Hito Histórico</h2>
            <div class="form-group">
                <label>Año (ej: 1873)</label>
                <input type="text" id="loreYear" placeholder="Año del suceso">
            </div>
            <div class="form-group">
                <label>Título del Suceso</label>
                <input type="text" id="loreTitle" placeholder="Ej: El Gran Descubrimiento">
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <input type="text" id="loreTag" placeholder="HISTORIA, EVENTO, FACCIONES...">
            </div>
            <div class="form-group">
                <label>Relato</label>
                <textarea id="loreContent" placeholder="Escribe la historia aquí..."></textarea>
            </div>
            <button class="btn-publish" id="btn-save-lore">Registrar en la Historia</button>
        </div>
        <div class="card">
            <h2><i class="fas fa-monument"></i> Cronología Actual</h2>
            <div id="loreAdminList" class="post-list"></div>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
            authDomain: "thenewwest-7eb5f.firebaseapp.com",
            projectId: "thenewwest-7eb5f",
            storageBucket: "thenewwest-7eb5f.firebasestorage.app",
            messagingSenderId: "605270552271",
            appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba",
            databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- NAVEGACIÓN ---
        window.switchTab = (event, sectionId) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(sectionId).classList.add('active');
        };

        // --- GUARDAR DATOS ---
        const saveItem = (path, data) => {
            const newRef = push(ref(db, path));
            set(newRef, { ...data, date: new Date().toLocaleDateString() })
                .then(() => alert("¡Guardado con éxito!"))
                .catch(err => alert("Error: " + err));
        };

        document.getElementById('btn-save-news').onclick = () => {
            const title = document.getElementById('newsTitle').value;
            const content = document.getElementById('newsContent').value;
            if(!title || !content) return alert("Faltan datos");
            saveItem('news', { title, content });
            document.getElementById('newsTitle').value = ''; document.getElementById('newsContent').value = '';
        };

        document.getElementById('btn-save-event').onclick = () => {
            const title = document.getElementById('eventTitle').value;
            const content = document.getElementById('eventContent').value;
            if(!title || !content) return alert("Faltan datos");
            saveItem('events', { title, content });
            document.getElementById('eventTitle').value = ''; document.getElementById('eventContent').value = '';
        };

        document.getElementById('btn-save-staff').onclick = () => {
            const title = document.getElementById('staffName').value;
            const content = document.getElementById('staffRange').value;
            const discord = document.getElementById('staffDiscord').value;
            if(!title || !content) return alert("Faltan datos");
            saveItem('staff', { title, content, discord });
            document.getElementById('staffName').value = ''; document.getElementById('staffRange').value = ''; document.getElementById('staffDiscord').value = '';
        };

        document.getElementById('btn-save-lore').onclick = () => {
            const year = document.getElementById('loreYear').value;
            const title = document.getElementById('loreTitle').value;
            const tag = document.getElementById('loreTag').value;
            const content = document.getElementById('loreContent').value;
            if(!year || !title || !content) return alert("Faltan datos históricos");
            
            const newRef = push(ref(db, 'lore'));
            set(newRef, { year, title, tag, content, date: new Date().toLocaleDateString() })
                .then(() => alert("Hito registrado"))
                .catch(err => alert(err));

            document.getElementById('loreYear').value = '';
            document.getElementById('loreTitle').value = '';
            document.getElementById('loreTag').value = '';
            document.getElementById('loreContent').value = '';
        };

        // --- RENDERIZAR LISTAS ---
        const renderList = (path, listId, metaPrefix) => {
            onValue(ref(db, path), (snapshot) => {
                const list = document.getElementById(listId);
                const data = snapshot.val();
                if (!data) {
                    list.innerHTML = '<p style="color:#94a3b8; font-size:0.9rem; text-align:center;">No hay registros aún.</p>';
                    return;
                }

                list.innerHTML = Object.keys(data).map(id => {
                    const item = data[id];
                    // Usar year si existe (para lore), si no title
                    const displayTitle = item.year ? `[${item.year}] ${item.title}` : item.title;
                    return `
                        <div class="post-item">
                            <div class="post-info">
                                <h3>${displayTitle}</h3>
                                <p>${item.content.substring(0, 60)}${item.content.length > 60 ? '...' : ''}</p>
                                <div class="post-meta">${item.date || ''} • ${metaPrefix}</div>
                            </div>
                            <button class="btn-delete" onclick="window.deleteItem('${path}', '${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                }).join('');
            });
        };

        window.deleteItem = (path, id) => {
            if(confirm("¿Seguro que quieres borrar esto?")) {
                remove(ref(db, `${path}/${id}`));
            }
        };

        // Iniciar las listas
        renderList('news', 'newsList', 'NOTICIA');
        renderList('events', 'eventsList', 'EVENTO');
        renderList('staff', 'staffList', 'STAFF');
        renderList('lore', 'loreAdminList', 'HITO');

    </script>
</body>
</html>
