<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
        authDomain: "thenewwest-7eb5f.firebaseapp.com",
        projectId: "thenewwest-7eb5f",
        storageBucket: "thenewwest-7eb5f.firebasestorage.app",
        messagingSenderId: "605270552271",
        appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba",
        databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // --- SEGURIDAD ---
    onAuthStateChanged(auth, (user) => {
        if (user) { document.body.style.display = "block"; } 
        else { window.location.href = "../index.html"; }
    });

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    window.switchTab = (event, sectionId) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(sectionId).classList.add('active');
    };

    // --- FUNCIÓN GENÉRICA PARA GUARDAR ---
    const saveItem = (path, data, clearFields) => {
        const newRef = push(ref(db, path));
        set(newRef, { ...data, date: new Date().toLocaleString() })
            .then(() => {
                alert("¡Publicado en el Catálogo!");
                clearFields.forEach(id => document.getElementById(id).value = "");
            })
            .catch(err => alert("Error: " + err.message));
    };

    // --- ASIGNACIÓN DE BOTONES (LAS CONEXIONES QUE FALTABAN) ---

    // 1. Noticias
    document.getElementById('btn-save-news').onclick = () => {
        saveItem('news', { 
            title: document.getElementById('newsTitle').value, 
            content: document.getElementById('newsContent').value 
        }, ['newsTitle', 'newsContent']);
    };

    // 2. Eventos
    document.getElementById('btn-save-event').onclick = () => {
        saveItem('events', { 
            title: document.getElementById('eventTitle').value, 
            content: document.getElementById('eventContent').value 
        }, ['eventTitle', 'eventContent']);
    };

    // 3. Staff
    document.getElementById('btn-save-staff').onclick = () => {
        saveItem('staff', { 
            title: document.getElementById('staffName').value, 
            content: document.getElementById('staffRange').value 
        }, ['staffName', 'staffRange']);
    };

    // 4. Lore (Cronología)
    document.getElementById('btn-save-lore').onclick = () => {
        saveItem('lore', { 
            year: document.getElementById('loreYear').value,
            title: document.getElementById('loreTitle').value, 
            content: document.getElementById('loreContent').value 
        }, ['loreYear', 'loreTitle', 'loreContent']);
    };

    // 5. Raphael (Con Etiqueta/Tag)
    document.getElementById('btn-save-raphael').onclick = () => {
        saveItem('raphael', { 
            title: document.getElementById('raphaelTitle').value, 
            content: document.getElementById('raphaelContent').value,
            tag: document.getElementById('raphaelTag').value // Campo nuevo
        }, ['raphaelTitle', 'raphaelContent', 'raphaelTag']);
    };

    window.deleteItem = (path, id) => {
        if(confirm("¿Eliminar este registro del archivo?")) remove(ref(db, `${path}/${id}`));
    };

    // --- RENDERIZADO DE LISTAS ---
    const renderBasic = (path, listId) => {
        onValue(ref(db, path), (snapshot) => {
            const list = document.getElementById(listId);
            const data = snapshot.val();
            if (!data) { list.innerHTML = '<p style="padding:10px; color:#94a3b8;">No hay registros.</p>'; return; }
            
            list.innerHTML = Object.keys(data).map(id => `
                <div class="post-item">
                    <div class="post-info">
                        <h3>${data[id].title || data[id].year || 'Registro'}</h3>
                        <p style="font-size:0.8rem;">${data[id].date}</p>
                    </div>
                    <button class="btn-delete" onclick="window.deleteItem('${path}', '${id}')"><i class="fas fa-trash"></i></button>
                </div>
            `).reverse().join('');
        });
    };

    // Carga inicial de listas
    renderBasic('news', 'newsList');
    renderBasic('events', 'eventsList');
    renderBasic('staff', 'staffList');
    renderBasic('lore', 'loreAdminList');
    renderBasic('art', 'artList');
    renderBasic('raphael', 'raphaelList');

    // (Tu lógica de Whitelist se mantiene igual abajo...)
</script>
