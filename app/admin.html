<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Maestro - The New West</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --raphael: #7c3aed;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: none; /* Se activa tras verificar login */
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }
        
        .tabs { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .tab { 
            padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 8px; cursor: pointer; color: var(--text); white-space: nowrap; 
        }
        .tab.active { background: var(--primary); border-color: var(--primary); }
        .tab-raphael.active { background: var(--raphael); border-color: var(--raphael); }

        .panel-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .panel-container { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #94a3b8; }
        input, textarea, select { 
            width: 100%; padding: 10px; background: #0f172a; border: 1px solid var(--border); 
            color: white; border-radius: 6px; box-sizing: border-box;
        }

        .btn { 
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; 
            font-weight: 600; width: 100%; margin-top: 10px;
        }
        .btn-save { background: var(--primary); color: white; }
        .btn-delete { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.8rem; }

        .list-item { 
            background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);
        }

        .section-content { display: none; }
        .section-content.active { display: block; }
    </style>
</head>
<body id="adminBody">

    <header>
        <div>
            <h1>Control de Mando</h1>
            <p id="userDisplay" style="color: var(--primary); font-size: 0.9rem;"></p>
        </div>
        <button onclick="logout()" class="btn" style="width: auto; background: var(--danger);">Cerrar Sesión</button>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="showTab(event, 'sec-noticias')">Noticias</div>
        <div class="tab" onclick="showTab(event, 'sec-raphael')">Raphael AI</div>
        <div class="tab" onclick="showTab(event, 'sec-lore')">Lore / Historia</div>
        <div class="tab" onclick="showTab(event, 'sec-buscados')">Se Busca</div>
        <div class="tab" onclick="showTab(event, 'sec-staff')">Staff</div>
    </div>

    <!-- NOTICIAS -->
    <div id="sec-noticias" class="section-content active">
        <div class="panel-container">
            <div class="card">
                <h3>Publicar Noticia</h3>
                <div class="form-group"><label>Título</label><input type="text" id="newsTitle"></div>
                <div class="form-group"><label>Contenido</label><textarea id="newsContent" rows="4"></textarea></div>
                <button class="btn btn-save" onclick="saveData('news', {title: 'newsTitle', content: 'newsContent'})">Publicar</button>
            </div>
            <div class="card"><h3>Historial</h3><div id="list-news"></div></div>
        </div>
    </div>

    <!-- RAPHAEL AI -->
    <div id="sec-raphael" class="section-content">
        <div class="panel-container">
            <div class="card" style="border-top: 4px solid var(--raphael);">
                <h3>Raphael: Actualizar Estado</h3>
                <div class="form-group">
                    <label>Estado del Sistema</label>
                    <select id="raphaelStatus">
                        <option value="OPERATIVO">OPERATIVO</option>
                        <option value="MANTENIMIENTO">MANTENIMIENTO</option>
                        <option value="ALERTA">ALERTA CRÍTICA</option>
                    </select>
                </div>
                <div class="form-group"><label>Mensaje de Raphael</label><input type="text" id="raphaelMsg"></div>
                <button class="btn btn-save" style="background: var(--raphael);" onclick="saveData('raphael_system', {status: 'raphaelStatus', msg: 'raphaelMsg'})">Actualizar IA</button>
            </div>
            <div class="card"><h3>Logs de Raphael</h3><div id="list-raphael_system"></div></div>
        </div>
    </div>

    <!-- LORE -->
    <div id="sec-lore" class="section-content">
        <div class="panel-container">
            <div class="card">
                <h3>Añadir Lore</h3>
                <div class="form-group"><label>Año/Época</label><input type="text" id="loreYear"></div>
                <div class="form-group"><label>Título de la Crónica</label><input type="text" id="loreTitle"></div>
                <div class="form-group"><label>Historia</label><textarea id="loreText" rows="4"></textarea></div>
                <button class="btn btn-save" onclick="saveData('lore', {year: 'loreYear', title: 'loreTitle', content: 'loreText'})">Guardar Historia</button>
            </div>
            <div class="card"><h3>Biblioteca de Lore</h3><div id="list-lore"></div></div>
        </div>
    </div>

    <!-- SE BUSCA -->
    <div id="sec-buscados" class="section-content">
        <div class="panel-container">
            <div class="card">
                <h3>Nueva Recompensa</h3>
                <div class="form-group"><label>Nombre del Criminal</label><input type="text" id="bountyName"></div>
                <div class="form-group"><label>Recompensa ($)</label><input type="text" id="bountyPrice"></div>
                <div class="form-group"><label>URL de la Imagen</label><input type="text" id="bountyImg"></div>
                <button class="btn btn-save" onclick="saveData('bounties', {name: 'bountyName', reward: 'bountyPrice', url: 'bountyImg'})">Emitir Orden</button>
            </div>
            <div class="card"><h3>Lista de Fugitivos</h3><div id="list-bounties"></div></div>
        </div>
    </div>

    <!-- STAFF -->
    <div id="sec-staff" class="section-content">
        <div class="panel-container">
            <div class="card">
                <h3>Gestionar Staff</h3>
                <div class="form-group"><label>Nombre</label><input type="text" id="stName"></div>
                <div class="form-group"><label>Rango</label><input type="text" id="stRole"></div>
                <div class="form-group"><label>URL Avatar</label><input type="text" id="stUrl"></div>
                <button class="btn btn-save" onclick="saveData('staff', {name: 'stName', role: 'stRole', url: 'stUrl'})">Añadir Miembro</button>
            </div>
            <div class="card"><h3>Equipo Actual</h3><div id="list-staff"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
            authDomain: "thenewwest-7eb5f.firebaseapp.com",
            projectId: "thenewwest-7eb5f",
            storageBucket: "thenewwest-7eb5f.firebasestorage.app",
            messagingSenderId: "605270552271",
            appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba",
            databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // --- SEGURIDAD ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('adminBody').style.display = 'block';
                document.getElementById('userDisplay').innerText = "Agente: " + user.email;
            } else {
                window.location.href = "../index.html";
            }
        });

        window.logout = () => signOut(auth);

        // --- NAVEGACIÓN ---
        window.showTab = (e, id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(id).classList.add('active');
        };

        // --- LÓGICA DE DATOS ---
        window.saveData = (path, fields) => {
            const data = { date: new Date().toLocaleDateString() };
            for (let key in fields) {
                data[key] = document.getElementById(fields[key]).value;
            }
            
            const newRef = push(ref(db, path));
            set(newRef, data).then(() => {
                alert("¡Actualizado con éxito!");
                for (let key in fields) document.getElementById(fields[key]).value = "";
            });
        };

        window.deleteItem = (path, id) => {
            if(confirm("¿Eliminar este registro?")) remove(ref(db, `${path}/${id}`));
        };

        // --- SINCRONIZACIÓN DE LISTAS ---
        const sync = (path) => {
            onValue(ref(db, path), (snap) => {
                const list = document.getElementById(`list-${path}`);
                const data = snap.val();
                if (!data) { list.innerHTML = "Vacio..."; return; }
                
                list.innerHTML = Object.keys(data).map(id => `
                    <div class="list-item">
                        <div>
                            <strong>${data[id].title || data[id].name || data[id].status}</strong><br>
                            <small>${data[id].date || ''}</small>
                        </div>
                        <button class="btn-delete" onclick="deleteItem('${path}', '${id}')">Borrar</button>
                    </div>
                `).reverse().join('');
            });
        };

        ['news', 'raphael_system', 'lore', 'bounties', 'staff'].forEach(sync);

    </script>
</body>
</html>
