<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel - The New West</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #e2e8f0;
            --success-green: #22c55e;
            --danger: #ef4444;
            --west-red: #4a0404;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* CORRECCIÓN: Quitamos display: none para que puedas entrar siempre */
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 40px; } 

        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .header-title h1 { font-size: 1.8rem; font-weight: 700; color: #0f172a; }

        .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 12px 10px; cursor: pointer; color: #64748b; font-weight: 500; display: flex; align-items: center; gap: 8px; position: relative; white-space: nowrap; }
        .tab.active { color: var(--primary-blue); }
        .tab.active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--primary-blue); }

        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .card { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; height: fit-content; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; }
        
        .btn-publish { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-logout { background: var(--danger); color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; }

        .post-item { border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; background: #fff; margin-bottom: 10px; }
        .thumb-preview { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; margin-right: 12px; }

        .content-section { display: none; }
        .content-section.active { display: grid; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Master Panel</h1>
            <p id="welcomeUser">Bienvenido al centro de mando.</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-publish" style="width: auto; padding: 8px 16px;" onclick="window.location.href='../index.html'">Ver Web</button>
            <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(event, 'noticias')"><i class="far fa-newspaper"></i> Noticias</div>
        <div class="tab" onclick="switchTab(event, 'staff-admin')"><i class="fas fa-users-cog"></i> Staff</div>
        <div class="tab" onclick="switchTab(event, 'bounties-admin')"><i class="fas fa-skull-crossbones"></i> Wanted</div>
        <div class="tab" onclick="switchTab(event, 'lore-admin')"><i class="fas fa-book"></i> Lore</div>
    </div>

    <!-- SECCIÓN NOTICIAS -->
    <div id="noticias" class="content-section active main-content">
        <div class="card">
            <h2>Nueva Noticia</h2>
            <div class="form-group"><label>Título</label><input type="text" id="newsTitle"></div>
            <div class="form-group"><label>Contenido</label><textarea id="newsContent" rows="4"></textarea></div>
            <button class="btn-publish" id="btn-save-news">Publicar</button>
        </div>
        <div class="card"><h2>Publicadas</h2><div id="newsList"></div></div>
    </div>

    <!-- SECCIÓN STAFF -->
    <div id="staff-admin" class="content-section main-content">
        <div class="card">
            <h2>Agregar Staff</h2>
            <div class="form-group"><label>Nombre</label><input type="text" id="staffName"></div>
            <div class="form-group"><label>Rango</label><input type="text" id="staffRole"></div>
            <div class="form-group"><label>URL Avatar</label><input type="text" id="staffUrl"></div>
            <button class="btn-publish" id="btn-save-staff">Guardar</button>
        </div>
        <div class="card"><h2>Equipo</h2><div id="staffList"></div></div>
    </div>

    <!-- SECCIÓN BOUNTIES -->
    <div id="bounties-admin" class="content-section main-content">
        <div class="card">
            <h2>Nueva Recompensa</h2>
            <div class="form-group"><label>Fugitivo</label><input type="text" id="bountyName"></div>
            <div class="form-group"><label>Recompensa</label><input type="text" id="bountyReward"></div>
            <div class="form-group"><label>URL Foto</label><input type="text" id="bountyUrl"></div>
            <button class="btn-publish" id="btn-save-bounty" style="background: var(--west-red);">Emitir Orden</button>
        </div>
        <div class="card"><h2>Buscados</h2><div id="bountiesList"></div></div>
    </div>

    <!-- SECCIÓN LORE -->
    <div id="lore-admin" class="content-section main-content">
        <div class="card">
            <h2>Nueva Cronología</h2>
            <div class="form-group"><label>Año</label><input type="text" id="loreYear"></div>
            <div class="form-group"><label>Título</label><input type="text" id="loreTitle"></div>
            <div class="form-group"><label>Historia</label><textarea id="loreContent" rows="4"></textarea></div>
            <button class="btn-publish" id="btn-save-lore">Añadir al libro</button>
        </div>
        <div class="card"><h2>Historia</h2><div id="loreList"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
            authDomain: "thenewwest-7eb5f.firebaseapp.com",
            projectId: "thenewwest-7eb5f",
            storageBucket: "thenewwest-7eb5f.firebasestorage.app",
            messagingSenderId: "605270552271",
            appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba",
            databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // --- SEGURIDAD COMENTADA TEMPORALMENTE ---
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                console.log("Usuario autenticado:", user.email);
            } else { 
                console.warn("Sin sesión activa. (Redirección desactivada para pruebas)");
                // window.location.href = "../index.html"; 
            }
        });

        document.getElementById('btnLogout').onclick = () => signOut(auth);

        window.switchTab = (event, sectionId) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(sectionId).classList.add('active');
        };

        window.deleteItem = (path, id) => {
            if(confirm("¿Seguro que quieres eliminar este registro?")) {
                remove(ref(db, `${path}/${id}`));
            }
        };

        const save = (path, data, fields) => {
            const newRef = push(ref(db, path));
            set(newRef, { ...data, date: new Date().toLocaleDateString() })
                .then(() => {
                    alert("¡Guardado correctamente!");
                    fields.forEach(f => document.getElementById(f).value = "");
                }).catch(err => alert("Error al guardar: " + err.message));
        };

        document.getElementById('btn-save-news').onclick = () => save('news', { 
            title: document.getElementById('newsTitle').value, 
            content: document.getElementById('newsContent').value 
        }, ['newsTitle', 'newsContent']);

        document.getElementById('btn-save-staff').onclick = () => save('staff', { 
            name: document.getElementById('staffName').value, 
            role: document.getElementById('staffRole').value,
            url: document.getElementById('staffUrl').value 
        }, ['staffName', 'staffRole', 'staffUrl']);

        document.getElementById('btn-save-bounty').onclick = () => save('bounties', { 
            name: document.getElementById('bountyName').value, 
            reward: document.getElementById('bountyReward').value,
            url: document.getElementById('bountyUrl').value 
        }, ['bountyName', 'bountyReward', 'bountyUrl']);

        document.getElementById('btn-save-lore').onclick = () => save('lore', { 
            year: document.getElementById('loreYear').value, 
            title: document.getElementById('loreTitle').value,
            content: document.getElementById('loreContent').value 
        }, ['loreYear', 'loreTitle', 'loreContent']);

        const syncList = (path, containerId) => {
            onValue(ref(db, path), (snapshot) => {
                const container = document.getElementById(containerId);
                const data = snapshot.val();
                if (!data) { container.innerHTML = "No hay datos."; return; }
                
                container.innerHTML = Object.keys(data).map(id => {
                    const item = data[id];
                    return `
                        <div class="post-item">
                            <div style="display:flex; align-items:center;">
                                ${item.url ? `<img src="${item.url}" class="thumb-preview">` : ''}
                                <div>
                                    <strong style="display:block;">${item.title || item.name}</strong>
                                    <small>${item.role || item.year || item.date}</small>
                                </div>
                            </div>
                            <button class="btn-delete" onclick="deleteItem('${path}', '${id}')" style="background:none; border:none; color:red; cursor:pointer;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                }).reverse().join('');
            });
        };

        syncList('news', 'newsList');
        syncList('staff', 'staffList');
        syncList('bounties', 'bountiesList');
        syncList('lore', 'loreList');

    </script>
</body>
</html>
