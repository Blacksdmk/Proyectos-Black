<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael · Chat Ejecutivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0f;
            font-family: 'Inter', monospace;
            color: #eef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .chat-container {
            width: 100%;
            max-width: 550px;
            background: #12121a;
            border: 2px solid #ff1a4f;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            box-shadow: 0 0 20px rgba(255,26,79,0.2);
        }
        .chat-header {
            background: #ff1a4f20;
            padding: 1rem;
            border-bottom: 1px solid #ff1a4f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 32px 32px 0 0;
        }
        .chat-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .close-btn {
            background: none;
            border: none;
            color: #ff8aaa;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            border-left: 3px solid;
            padding: 0.5rem 0.8rem;
            background: #1a1a26;
            border-radius: 12px;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            border-left-color: #ff1a4f;
            background: #2a1a22;
        }
        .message.raphael {
            align-self: flex-start;
            border-left-color: #fff;
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid #2a2a35;
        }
        .input-area input {
            flex: 1;
            background: #1e1e2a;
            border: 1px solid #ff1a4f;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            color: white;
            font-family: inherit;
        }
        .input-area button {
            background: #ff1a4f;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            font-weight: bold;
            cursor: pointer;
            color: black;
        }
        .key-config {
            padding: 0.8rem;
            border-top: 1px dashed #ff1a4f;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }
        .key-config input {
            flex: 2;
            background: #111;
            border: 1px solid #ff1a4f;
            padding: 0.4rem;
            color: white;
            border-radius: 20px;
        }
        .key-config button {
            background: #2a2a35;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            color: #ffb0c2;
        }
        .status {
            font-size: 0.7rem;
            color: #ff8aaa;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2><i class="fas fa-robot"></i> RAPHAEL · CONSULTA DIRECTA</h2>
        <button class="close-btn" onclick="window.close()"><i class="fas fa-times"></i></button>
    </div>
    <div class="messages" id="chatMessages">
        <div class="message raphael">[Raphael] Núcleo activo. Proporcione su API key de DeepSeek para comenzar.</div>
    </div>
    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Haz una pregunta..." autocomplete="off">
        <button id="sendBtn"><i class="fas fa-paper-plane"></i> Enviar</button>
    </div>
    <div class="key-config">
        <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" autocomplete="off">
        <button id="saveKeyBtn">Guardar clave</button>
        <span id="keyStatus" class="status"></span>
    </div>
</div>

<script>
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    const apiInput = document.getElementById('apiKeyInput');
    const statusSpan = document.getElementById('keyStatus');
    if (apiKey) {
        apiInput.value = apiKey;
        statusSpan.innerText = '✅ Clave cargada';
    } else {
        statusSpan.innerText = '⚠️ Sin clave';
    }

    document.getElementById('saveKeyBtn').onclick = () => {
        const newKey = apiInput.value.trim();
        if (newKey) {
            apiKey = newKey;
            localStorage.setItem('deepseek_api_key', apiKey);
            statusSpan.innerText = '✅ Guardada';
        } else {
            localStorage.removeItem('deepseek_api_key');
            apiKey = '';
            statusSpan.innerText = '❌ Eliminada';
        }
    };

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = sender === 'raphael' ? `[Raphael] ${text}` : `[Tú] ${text}`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function askRaphael(question) {
        if (!apiKey) {
            addMessage('raphael', 'ERROR: No se ha configurado API key. Guárdela en el campo inferior.');
            return;
        }
        addMessage('user', question);
        addMessage('raphael', 'Procesando análisis...');
        const loadingMsg = chatMessages.lastChild;
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: 'Eres Raphael, un asistente analítico sin emociones, estilo Danganronpa. Responde directo, sin cortesías, usando "Aviso.", "Respuesta.", "Alerta." cuando corresponda. No uses saludos ni despedidas.' },
                        { role: 'user', content: question }
                    ],
                    temperature: 0.7
                })
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `HTTP ${response.status}`);
            }
            const data = await response.json();
            const reply = data.choices[0].message.content;
            loadingMsg.remove();
            addMessage('raphael', reply);
        } catch (err) {
            loadingMsg.remove();
            addMessage('raphael', `Alerta. Error: ${err.message}`);
        }
    }

    sendBtn.onclick = () => {
        const q = chatInput.value.trim();
        if (!q) return;
        chatInput.value = '';
        askRaphael(q);
    };
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
</script>
</body>
</html>
