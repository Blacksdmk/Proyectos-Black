<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The New West - Servidor de Minecraft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light-bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: white; color: var(--text-main); line-height: 1.6; }

        /* --- NAVEGACIÓN --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; color: var(--dark); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .nav-links a:hover { color: var(--primary); }

        /* --- SECCIONES --- */
        .section { display: none; padding: 60px 8%; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h2 { font-size: 2.5rem; color: var(--dark); letter-spacing: -1px; }

        /* --- GRID DINÁMICO --- */
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        /* Estilo Noticias y Lore */
        .card-post { padding: 30px; border: 1px solid var(--border); border-radius: 16px; background: white; }
        .card-post span { color: var(--primary); font-weight: 700; font-size: 0.8rem; }
        .card-post h3 { margin: 10px 0; font-size: 1.4rem; }

        /* Estilo Staff */
        .staff-card { text-align: center; padding: 30px; border: 1px solid var(--border); border-radius: 16px; }
        .staff-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary); }

        /* Estilo Se Busca */
        .bounty-card { background: #fdf5e6; border: 2px solid #4a0404; padding: 20px; text-align: center; color: #4a0404; }
        .bounty-card img { width: 100%; height: 250px; object-fit: cover; border: 1px solid #4a0404; margin-bottom: 15px; }

        footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-hat-cowboy"></i> The New West</div>
        <div class="nav-links">
            <a onclick="showSection('inicio')">Inicio</a>
            <a onclick="showSection('noticias')">Noticias</a>
            <a onclick="showSection('lore')">Lore</a>
            <a onclick="showSection('bounties')">Se Busca</a>
            <a onclick="showSection('galeria')">Galería</a>
            <a onclick="showSection('staff')">Staff</a>
        </div>
    </nav>

    <!-- INICIO -->
    <div id="inicio" class="section active">
        <div style="text-align: center; padding: 80px 0;">
            <h1 style="font-size: 4rem; letter-spacing: -2px;">Un Nuevo Horizonte.</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Bienvenido al servidor de rol más inmersivo del Oeste.</p>
        </div>
    </div>

    <!-- NOTICIAS (DINÁMICO) -->
    <div id="noticias" class="section">
        <div class="section-header"><h2>Últimas Noticias</h2></div>
        <div id="dynamicNews" class="content-grid"></div>
    </div>

    <!-- LORE (DINÁMICO) -->
    <div id="lore" class="section">
        <div class="section-header"><h2>Cronología del Oeste</h2></div>
        <div id="dynamicLore" class="content-grid"></div>
    </div>

    <!-- STAFF (DINÁMICO) -->
    <div id="staff" class="section">
        <div class="section-header"><h2>Nuestro Equipo</h2></div>
        <div id="dynamicStaff" class="content-grid"></div>
    </div>

    <!-- SE BUSCA (DINÁMICO) -->
    <div id="bounties" class="section">
        <div class="section-header"><h2>Fugitivos de la Ley</h2></div>
        <div id="dynamicBounties" class="content-grid"></div>
    </div>

    <!-- GALERÍA (DINÁMICO) -->
    <div id="galeria" class="section">
        <div class="section-header"><h2>Galería de la Comunidad</h2></div>
        <div id="dynamicArt" class="content-grid"></div>
    </div>

    <footer>
        <p>© 2026 The New West</p>
        <a href="app/admin.html" style="color: #ccc; font-size: 0.7rem; text-decoration: none;">Acceso Staff</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
            authDomain: "thenewwest-7eb5f.firebaseapp.com",
            projectId: "thenewwest-7eb5f",
            storageBucket: "thenewwest-7eb5f.firebasestorage.app",
            messagingSenderId: "605270552271",
            appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba",
            databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FUNCIÓN PARA MOSTRAR SECCIONES ---
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // --- CARGADOR DE DATOS DINÁMICOS ---
        const loadContent = (path, containerId, templateFn) => {
            onValue(ref(db, path), (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById(containerId);
                if (!data) {
                    container.innerHTML = "<p>Próximamente...</p>";
                    return;
                }
                // Convertimos objeto a Array y lo mostramos
                container.innerHTML = Object.values(data).reverse().map(templateFn).join('');
            });
        };

        // 1. Cargar Noticias
        loadContent('news', 'dynamicNews', n => `
            <div class="card-post">
                <span>${n.date || 'Reciente'}</span>
                <h3>${n.title}</h3>
                <p>${n.content}</p>
            </div>
        `);

        // 2. Cargar Lore (Cronología)
        loadContent('lore', 'dynamicLore', l => `
            <div class="card-post">
                <span>Año ${l.year}</span>
                <h3>${l.title}</h3>
                <p>${l.content}</p>
            </div>
        `);

        // 3. Cargar Staff
        loadContent('staff', 'dynamicStaff', s => `
            <div class="staff-card">
                <img src="${s.url || 'https://via.placeholder.com/100'}" class="staff-avatar">
                <h3>${s.name}</h3>
                <p style="color:var(--primary); font-weight:700;">${s.role}</p>
                <p style="font-size:0.85rem; margin-top:10px;">${s.desc}</p>
            </div>
        `);

        // 4. Cargar Bounties
        loadContent('bounties', 'dynamicBounties', b => `
            <div class="bounty-card">
                <p style="font-weight:900;">WANTED</p>
                <img src="${b.url}">
                <h3>${b.name}</h3>
                <p>${b.reason}</p>
                <p style="font-weight:bold; margin-top:10px; font-size:1.2rem;">RECOMPENSA: $${b.reward}</p>
            </div>
        `);

        // 5. Cargar Arte
        loadContent('art', 'dynamicArt', a => `
            <div class="card-post" style="padding:10px;">
                <img src="${a.url}" style="width:100%; border-radius:10px;">
                <p style="text-align:center; margin-top:10px; font-weight:600;">${a.title}</p>
            </div>
        `);

    </script>
</body>
</html>
