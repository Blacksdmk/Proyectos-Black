<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael · Proyectos Personales</title>
    <!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0f;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,26,79,0.05) 0%, transparent 60%);
            font-family: 'Inter', system-ui, sans-serif;
            color: #eef;
            padding: 2rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        /* Header Danganronpa */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 2px solid #ff1a4f;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .title h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #ff1a4f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .title p {
            font-size: 0.75rem;
            color: #ff7b9c;
            font-family: monospace;
        }
        .badge {
            background: #1e1e2a;
            padding: 0.4rem 1rem;
            border-left: 3px solid #ff1a4f;
            font-weight: 600;
        }
        .chat-btn {
            background: #ff1a4f20;
            border: 1px solid #ff1a4f;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #ffb0c2;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .chat-btn:hover {
            background: #ff1a4f;
            color: #000;
            box-shadow: 0 0 12px #ff1a4f;
        }
        /* KPIs */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .kpi-card {
            background: rgba(20,20,30,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,26,79,0.3);
            border-radius: 24px;
            padding: 1rem 1.2rem;
        }
        .kpi-label { font-size: 0.7rem; text-transform: uppercase; color: #ff8aaa; }
        .kpi-value { font-size: 2rem; font-weight: 700; font-family: monospace; }
        /* Proyectos grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .project-card {
            background: #12121a;
            border: 1px solid #2a2a35;
            border-radius: 28px;
            padding: 1.2rem;
            transition: 0.1s;
        }
        .project-card:hover { border-color: #ff1a4f; box-shadow: 0 0 12px rgba(255,26,79,0.2); }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            background: none;
            border: none;
            color: #ffb7c5;
            font-family: inherit;
            width: 70%;
            padding: 0.2rem;
        }
        .delete-proj {
            background: none;
            border: none;
            color: #ff6a6a;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .progress-bar {
            background: #2a2a35;
            height: 8px;
            border-radius: 10px;
            margin: 0.8rem 0;
        }
        .progress-fill {
            background: #ff1a4f;
            width: 0%;
            height: 8px;
            border-radius: 10px;
        }
        .task-list {
            list-style: none;
            margin: 0.8rem 0;
            max-height: 220px;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid #222;
        }
        .task-check { accent-color: #ff1a4f; width: 16px; height: 16px; }
        .task-text {
            flex: 1;
            background: none;
            border: none;
            color: #ddd;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .delete-task {
            background: none;
            border: none;
            color: #a55;
            cursor: pointer;
        }
        .add-task {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }
        .add-task input {
            flex: 1;
            background: #1e1e2a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 0.4rem 0.8rem;
            color: white;
        }
        .add-task button, .add-project {
            background: #2a2a35;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: #ffb0c2;
            cursor: pointer;
        }
        .new-project-form {
            margin-top: 2rem;
            display: flex;
            gap: 0.8rem;
            background: #0e0e16;
            padding: 1rem;
            border-radius: 60px;
            border: 1px solid #2a2a35;
        }
        .new-project-form input {
            flex: 1;
            background: #1e1e2a;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            color: white;
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #ff7b9c;
            border-top: 1px solid #222;
            padding-top: 1rem;
        }
        i { margin-right: 0.3rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1><i class="fas fa-tasks"></i> RAPHAEL · PROYECTOS PERSONALES</h1>
            <p>⚡ MONOKUMA EXECUTIVE | SINCRONIZACIÓN EN TIEMPO REAL</p>
        </div>
        <div>
            <button class="chat-btn" id="openChatBtn"><i class="fas fa-comment-dots"></i> ABRIR CHAT CON RAPHAEL</button>
            <span class="badge"><i class="fas fa-dice-d6"></i> DANGAN ELEGANCE</span>
        </div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">📁 PROYECTOS ACTIVOS</div><div class="kpi-value" id="totalProyectos">0</div></div>
        <div class="kpi-card"><div class="kpi-label">✅ TAREAS COMPLETADAS</div><div class="kpi-value" id="tareasCompletadas">0</div></div>
        <div class="kpi-card"><div class="kpi-label">🕒 TAREAS PENDIENTES</div><div class="kpi-value" id="tareasPendientes">0</div></div>
        <div class="kpi-card"><div class="kpi-label">📊 PROGRESO GLOBAL</div><div class="kpi-value" id="progresoGlobal">0%</div></div>
    </div>

    <div class="projects-grid" id="projectsContainer"></div>

    <div class="new-project-form">
        <input type="text" id="newProjectName" placeholder="Nuevo proyecto (ej: Aprender Blender, Doblaje...)" autocomplete="off">
        <button class="add-project" id="addProjectBtn"><i class="fas fa-plus-circle"></i> CREAR PROYECTO</button>
    </div>
    <div class="footer">
        <i class="fas fa-firebase"></i> Firebase Firestore · Datos sincronizados entre dispositivos · Estilo Danganronpa
    </div>
</div>

<script>
    // Firebase Config (proporcionada por el usuario)
    const firebaseConfig = {
        apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
        authDomain: "thenewwest-7eb5f.firebaseapp.com",
        databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com",
        projectId: "thenewwest-7eb5f",
        storageBucket: "thenewwest-7eb5f.firebasestorage.app",
        messagingSenderId: "605270552271",
        appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const projectsRef = db.collection('personal_projects');

    let projects = []; // array local

    // Renderizar todo
    function renderDashboard() {
        const totalProy = projects.length;
        let totalTasks = 0, completed = 0;
        projects.forEach(p => {
            totalTasks += (p.tasks?.length || 0);
            completed += (p.tasks?.filter(t => t.done).length || 0);
        });
        document.getElementById('totalProyectos').innerText = totalProy;
        document.getElementById('tareasCompletadas').innerText = completed;
        document.getElementById('tareasPendientes').innerText = totalTasks - completed;
        const globalProgress = totalTasks === 0 ? 0 : Math.round((completed / totalTasks) * 100);
        document.getElementById('progresoGlobal').innerHTML = `${globalProgress}%`;

        const container = document.getElementById('projectsContainer');
        if (projects.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; border:1px dashed #ff1a4f; border-radius:40px;">⚠️ No hay proyectos. Crea uno arriba.</div>`;
            return;
        }
        container.innerHTML = projects.map(proj => {
            const tasks = proj.tasks || [];
            const completedTasks = tasks.filter(t => t.done).length;
            const percent = tasks.length ? (completedTasks / tasks.length) * 100 : 0;
            return `
                <div class="project-card" data-id="${proj.id}">
                    <div class="project-header">
                        <input type="text" class="project-title" value="${escapeHtml(proj.name)}" data-id="${proj.id}">
                        <button class="delete-proj" data-id="${proj.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    <div class="task-list" id="tasklist-${proj.id}">
                        ${tasks.map((task, idx) => `
                            <div class="task-item" data-taskidx="${idx}">
                                <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} data-projid="${proj.id}" data-taskidx="${idx}">
                                <input type="text" class="task-text" value="${escapeHtml(task.text)}" data-projid="${proj.id}" data-taskidx="${idx}">
                                <button class="delete-task" data-projid="${proj.id}" data-taskidx="${idx}"><i class="fas fa-times-circle"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <div class="add-task">
                        <input type="text" id="newtask-${proj.id}" placeholder="Nueva tarea...">
                        <button data-addtask="${proj.id}">+ AGREGAR</button>
                    </div>
                </div>
            `;
        }).join('');
        attachEvents();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function attachEvents() {
        // Editar nombre proyecto
        document.querySelectorAll('.project-title').forEach(inp => {
            inp.onblur = () => {
                const id = inp.getAttribute('data-id');
                const newName = inp.value.trim();
                if (newName) {
                    const proj = projects.find(p => p.id === id);
                    if (proj) proj.name = newName;
                    syncToFirestore();
                } else {
                    inp.value = projects.find(p => p.id === id)?.name || '';
                }
            };
        });
        // Eliminar proyecto
        document.querySelectorAll('.delete-proj').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                projects = projects.filter(p => p.id !== id);
                syncToFirestore();
            };
        });
        // Checkbox tareas
        document.querySelectorAll('.task-check').forEach(cb => {
            cb.onchange = () => {
                const projid = cb.getAttribute('data-projid');
                const taskidx = parseInt(cb.getAttribute('data-taskidx'));
                const proj = projects.find(p => p.id === projid);
                if (proj && proj.tasks[taskidx]) {
                    proj.tasks[taskidx].done = cb.checked;
                    syncToFirestore();
                }
            };
        });
        // Editar texto tarea
        document.querySelectorAll('.task-text').forEach(txt => {
            txt.onblur = () => {
                const projid = txt.getAttribute('data-projid');
                const taskidx = parseInt(txt.getAttribute('data-taskidx'));
                const newText = txt.value.trim();
                if (newText) {
                    const proj = projects.find(p => p.id === projid);
                    if (proj && proj.tasks[taskidx]) proj.tasks[taskidx].text = newText;
                    syncToFirestore();
                } else {
                    const proj = projects.find(p => p.id === projid);
                    if (proj && proj.tasks[taskidx]) txt.value = proj.tasks[taskidx].text;
                }
            };
        });
        // Eliminar tarea
        document.querySelectorAll('.delete-task').forEach(btn => {
            btn.onclick = () => {
                const projid = btn.getAttribute('data-projid');
                const taskidx = parseInt(btn.getAttribute('data-taskidx'));
                const proj = projects.find(p => p.id === projid);
                if (proj) {
                    proj.tasks.splice(taskidx, 1);
                    syncToFirestore();
                }
            };
        });
        // Añadir tarea
        document.querySelectorAll('[data-addtask]').forEach(btn => {
            btn.onclick = () => {
                const projid = btn.getAttribute('data-addtask');
                const input = document.getElementById(`newtask-${projid}`);
                const text = input.value.trim();
                if (text) {
                    const proj = projects.find(p => p.id === projid);
                    if (proj) {
                        if (!proj.tasks) proj.tasks = [];
                        proj.tasks.push({ text: text, done: false });
                        syncToFirestore();
                        input.value = '';
                    }
                }
            };
        });
    }

    function syncToFirestore() {
        // Guardar cada proyecto como documento individual (más eficiente)
        const batch = db.batch();
        projects.forEach(proj => {
            const docRef = projectsRef.doc(proj.id);
            batch.set(docRef, { name: proj.name, tasks: proj.tasks, updatedAt: new Date() });
        });
        // Eliminar documentos que ya no existen
        batch.commit().catch(err => console.error("Error sync:", err));
    }

    // Escuchar cambios en tiempo real
    function listenFirestore() {
        projectsRef.onSnapshot(snapshot => {
            const newProjects = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                newProjects.push({
                    id: doc.id,
                    name: data.name || 'Sin título',
                    tasks: data.tasks || []
                });
            });
            projects = newProjects;
            renderDashboard();
        }, error => {
            console.error("Firestore error:", error);
            document.getElementById('projectsContainer').innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ff6a6a;">⚠️ Error de conexión con Firebase. Verifique reglas.</div>`;
        });
    }

    // Crear nuevo proyecto
    document.getElementById('addProjectBtn').onclick = () => {
        const nameInput = document.getElementById('newProjectName');
        const name = nameInput.value.trim();
        if (!name) return;
        const newId = Date.now().toString();
        const newProj = { id: newId, name: name, tasks: [] };
        projects.push(newProj);
        syncToFirestore();
        nameInput.value = '';
    };

    // Abrir chat en nueva ventana (mismo directorio)
    document.getElementById('openChatBtn').onclick = () => {
        window.open('chat.html', '_blank', 'width=600,height=700,menubar=no,toolbar=no');
    };

    // Inicializar
    listenFirestore();
</script>
</body>
</html>
