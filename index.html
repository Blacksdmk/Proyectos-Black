<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANGAN PROJECT - Raphael Execution</title>
    <!-- Firebase Realtime Database SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* DANGANRONPA THEME */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            background-image: repeating-linear-gradient(45deg, #111 0px, #111 2px, #1a0000 2px, #1a0000 8px);
            font-family: 'Courier New', 'MS Gothic', monospace;
            color: #f0f0f0;
            padding: 1.5rem;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            border: 3px solid #ff1a4f;
            box-shadow: 0 0 0 2px #000, 0 0 0 5px #ff1a4f;
            background: rgba(0,0,0,0.85);
            padding: 1.5rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #ff1a4f;
            padding-bottom: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .mono-icon { font-size: 2rem; filter: drop-shadow(0 0 3px #ff1a4f); }
        h1 { font-size: 1.6rem; letter-spacing: -1px; color: #ff1a4f; text-transform: uppercase; text-shadow: 2px 2px 0 #4a0000; }
        .stats { background: #1a0000; padding: 0.3rem 0.8rem; border-left: 4px solid #ff1a4f; font-size: 0.75rem; }
        .dashboard { display: flex; gap: 2rem; flex-wrap: wrap; }
        .projects-section { flex: 3; min-width: 280px; }
        .chat-section {
            flex: 1.5; min-width: 280px; background: #0a0000; border: 1px solid #ff1a4f;
            display: flex; flex-direction: column; height: 70vh; position: sticky; top: 1rem;
        }
        .chat-header { background: #ff1a4f; color: #000; padding: 0.6rem; font-weight: bold; text-align: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 0.8rem; display: flex; flex-direction: column; gap: 0.8rem; font-size: 0.8rem; }
        .message { border-left: 3px solid; padding: 0.4rem 0.6rem; background: #110000; }
        .message.user { border-left-color: #ff1a4f; align-self: flex-end; text-align: right; background: #2a0000; }
        .message.raphael { border-left-color: #ffffff; }
        .chat-input-area { display: flex; border-top: 1px solid #ff1a4f; padding: 0.6rem; gap: 0.5rem; }
        .chat-input-area input { flex: 1; background: #000; border: 1px solid #ff1a4f; color: #ffb0c0; padding: 0.5rem; font-family: monospace; }
        .chat-input-area button, .key-config button { background: #ff1a4f; border: none; color: #000; font-weight: bold; padding: 0.5rem 1rem; cursor: pointer; }
        .key-config { padding: 0.6rem; border-top: 1px dashed #ff1a4f; display: flex; gap: 0.5rem; flex-wrap: wrap; font-size: 0.7rem; }
        .key-config input { flex: 2; background: #111; border: 1px solid #ff1a4f; color: white; padding: 0.3rem; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; margin-top: 1rem; }
        .project-card { background: #0a0505; border: 1px solid #ff1a4f; padding: 1rem; transition: 0.05s linear; }
        .project-card:hover { border-width: 2px; box-shadow: 0 0 8px #ff1a4f; }
        .project-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; }
        .project-title { font-size: 1.2rem; background: none; border: none; color: #ffb7c5; font-weight: bold; width: 70%; }
        .delete-project { background: none; border: none; color: #ff1a4f; font-size: 1.2rem; cursor: pointer; }
        .progress-bar-bg { background: #2a1515; height: 8px; margin: 0.8rem 0; }
        .progress-fill { background: #ff1a4f; width: 0%; height: 100%; }
        .progress-text { font-size: 0.7rem; text-align: right; color: #ff8aa0; }
        .task-list { list-style: none; margin: 0.8rem 0; max-height: 200px; overflow-y: auto; }
        .task-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; border-bottom: 1px dotted #4a1a1a; }
        .task-check { width: 16px; height: 16px; accent-color: #ff1a4f; }
        .task-text { flex: 1; background: none; border: none; color: #ddd; font-family: monospace; font-size: 0.8rem; }
        .delete-task { background: none; border: none; color: #ff6666; cursor: pointer; }
        .add-task { display: flex; gap: 0.3rem; margin-top: 0.6rem; }
        .add-task input { flex: 1; background: #1a0505; border: 1px solid #ff1a4f; color: white; padding: 0.3rem; }
        .add-task button, .add-project-btn { background: #2a0a0a; border: 1px solid #ff1a4f; color: #ffb0c0; padding: 0.3rem 0.6rem; cursor: pointer; }
        .new-project-form { margin-top: 2rem; display: flex; gap: 0.6rem; border-top: 2px solid #ff1a4f; padding-top: 1.5rem; }
        .new-project-form input { flex: 1; background: #000; border: 1px solid #ff1a4f; padding: 0.5rem; color: white; }
        button { font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="mono-icon">🔴⚫ MONOKUMA EXECUTION</div>
        <h1>RAPHAEL // DANGAN PROJECT MANAGER</h1>
        <div class="stats" id="statsDisplay">---</div>
    </header>
    <div class="dashboard">
        <div class="projects-section">
            <div class="projects-grid" id="projectsContainer"></div>
            <div class="new-project-form">
                <input type="text" id="newProjectName" placeholder="Nuevo caso / proyecto..." autocomplete="off">
                <button id="addProjectBtn">+ EJECUTAR PROYECTO</button>
            </div>
        </div>
        <div class="chat-section">
            <div class="chat-header">⚡ CHAT CON RAPHAEL ⚡</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message raphael">[Raphael] Sistema listo. Proporcione API key para consultas.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Pregúntame...">
                <button id="sendChatBtn">ENVIAR</button>
            </div>
            <div class="key-config">
                <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" autocomplete="off">
                <button id="saveApiKeyBtn">GUARDAR CLAVE</button>
                <span id="keyStatus" style="color:#ff8aa0; font-size:0.7rem;"></span>
            </div>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // CONFIGURACIÓN FIREBASE (Realtime Database)
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
        authDomain: "thenewwest-7eb5f.firebaseapp.com",
        databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com",
        projectId: "thenewwest-7eb5f",
        storageBucket: "thenewwest-7eb5f.firebasestorage.app",
        messagingSenderId: "605270552271",
        appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    // Usaremos el nodo "raphael_projects" dentro de "pre_registros" (que tiene write true según reglas)
    // Si prefiere usar "raphael", modifique la regla a write true. Por ahora usamos "pre_registros/raphael_projects"
    const projectsRef = database.ref('pre_registros/raphael_projects');

    let projects = [];
    let currentUserId = "user_default"; // para múltiples usuarios, pero aquí es fijo

    // --------------------------------------------------------------
    // SINCRONIZACIÓN CON REALTIME DATABASE
    // --------------------------------------------------------------
    function syncToFirestore() {  // nombre legacy, pero es Realtime
        projectsRef.set(projects).catch(err => {
            console.error("Error escribiendo en RTDB:", err);
            alert("Alerta. Error de escritura. Revise reglas de Firebase.");
        });
    }

    projectsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && Array.isArray(data)) {
            projects = data;
        } else if (data && typeof data === 'object') {
            // si por algún motivo es objeto, convertir a array
            projects = Object.values(data);
        } else {
            projects = [];
        }
        renderProjects();
    });

    // --------------------------------------------------------------
    // RENDER Y EVENTOS
    // --------------------------------------------------------------
    function updateStats() {
        const totalTasks = projects.reduce((acc, p) => acc + (p.tasks?.length || 0), 0);
        const completedTasks = projects.reduce((acc, p) => acc + (p.tasks?.filter(t => t.done).length || 0), 0);
        document.getElementById('statsDisplay').innerHTML = `📊 PROYECTOS: ${projects.length} | TAREAS: ${completedTasks}/${totalTasks}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        if (!container) return;
        if (projects.length === 0) {
            container.innerHTML = `<div style="text-align:center; border:1px solid #ff1a4f; padding:2rem;">⚠️ No hay proyectos activos. Cree uno nuevo.</div>`;
            updateStats();
            return;
        }
        container.innerHTML = projects.map(proj => {
            const tasks = proj.tasks || [];
            const completed = tasks.filter(t => t.done).length;
            const percent = tasks.length === 0 ? 0 : (completed / tasks.length) * 100;
            return `
                <div class="project-card" data-id="${proj.id}">
                    <div class="project-header">
                        <input type="text" class="project-title" value="${escapeHtml(proj.name)}" data-id="${proj.id}" data-field="name">
                        <button class="delete-project" data-id="${proj.id}">🗡️ ELIMINAR</button>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    <div class="progress-text">${percent.toFixed(0)}% COMPLETADO</div>
                    <ul class="task-list" data-id="${proj.id}">
                        ${tasks.map((task, idx) => `
                            <li class="task-item" data-taskidx="${idx}">
                                <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} data-projid="${proj.id}" data-taskidx="${idx}">
                                <input type="text" class="task-text" value="${escapeHtml(task.text)}" data-projid="${proj.id}" data-taskidx="${idx}">
                                <button class="delete-task" data-projid="${proj.id}" data-taskidx="${idx}">✖</button>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="add-task">
                        <input type="text" placeholder="Nueva tarea..." id="newtask-${proj.id}">
                        <button data-addtask="${proj.id}">+</button>
                    </div>
                </div>
            `;
        }).join('');
        updateStats();
        attachProjectEvents();
    }

    function attachProjectEvents() {
        // Eliminar proyecto
        document.querySelectorAll('.delete-project').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                projects = projects.filter(p => p.id !== id);
                syncToFirestore();
            };
        });
        // Editar nombre proyecto
        document.querySelectorAll('.project-title').forEach(input => {
            input.onblur = () => {
                const id = input.getAttribute('data-id');
                const newName = input.value.trim();
                if (newName) {
                    const proj = projects.find(p => p.id === id);
                    if (proj) proj.name = newName;
                    syncToFirestore();
                } else {
                    input.value = projects.find(p => p.id === id)?.name || '';
                }
            };
        });
        // Checkbox tareas
        document.querySelectorAll('.task-check').forEach(cb => {
            cb.onchange = (e) => {
                const projid = cb.getAttribute('data-projid');
                const taskidx = parseInt(cb.getAttribute('data-taskidx'));
                const proj = projects.find(p => p.id === projid);
                if (proj && proj.tasks[taskidx]) {
                    proj.tasks[taskidx].done = cb.checked;
                    syncToFirestore();
                }
            };
        });
        // Editar texto tarea
        document.querySelectorAll('.task-text').forEach(txt => {
            txt.onblur = () => {
                const projid = txt.getAttribute('data-projid');
                const taskidx = parseInt(txt.getAttribute('data-taskidx'));
                const newText = txt.value.trim();
                if (newText) {
                    const proj = projects.find(p => p.id === projid);
                    if (proj && proj.tasks[taskidx]) {
                        proj.tasks[taskidx].text = newText;
                        syncToFirestore();
                    }
                } else {
                    txt.value = projects.find(p => p.id === projid)?.tasks[taskidx]?.text || '';
                }
            };
        });
        // Eliminar tarea
        document.querySelectorAll('.delete-task').forEach(btn => {
            btn.onclick = () => {
                const projid = btn.getAttribute('data-projid');
                const taskidx = parseInt(btn.getAttribute('data-taskidx'));
                const proj = projects.find(p => p.id === projid);
                if (proj) {
                    proj.tasks.splice(taskidx, 1);
                    syncToFirestore();
                }
            };
        });
        // Añadir tarea
        document.querySelectorAll('[data-addtask]').forEach(btn => {
            btn.onclick = () => {
                const projid = btn.getAttribute('data-addtask');
                const inputField = document.getElementById(`newtask-${projid}`);
                const taskText = inputField.value.trim();
                if (taskText) {
                    const proj = projects.find(p => p.id === projid);
                    if (proj) {
                        if (!proj.tasks) proj.tasks = [];
                        proj.tasks.push({ text: taskText, done: false });
                        syncToFirestore();
                        inputField.value = '';
                    }
                }
            };
        });
    }

    // Añadir nuevo proyecto
    document.getElementById('addProjectBtn').onclick = () => {
        const nameInput = document.getElementById('newProjectName');
        const name = nameInput.value.trim();
        if (name === "") return;
        const newProject = {
            id: Date.now().toString(),
            name: name,
            tasks: [],
            createdAt: new Date().toISOString()
        };
        projects.push(newProject);
        syncToFirestore();
        nameInput.value = "";
    };

    // --------------------------------------------------------------
    // MINI CHAT CON RAPHAEL (DeepSeek API)
    // --------------------------------------------------------------
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    const apiKeyInput = document.getElementById('apiKeyInput');
    const keyStatus = document.getElementById('keyStatus');
    if (apiKey) {
        apiKeyInput.value = apiKey;
        keyStatus.innerText = '✅ Clave cargada';
    } else {
        keyStatus.innerText = '⚠️ Sin clave';
    }

    document.getElementById('saveApiKeyBtn').onclick = () => {
        const newKey = apiKeyInput.value.trim();
        if (newKey) {
            apiKey = newKey;
            localStorage.setItem('deepseek_api_key', apiKey);
            keyStatus.innerText = '✅ Guardada';
        } else {
            localStorage.removeItem('deepseek_api_key');
            apiKey = '';
            keyStatus.innerText = '❌ Eliminada';
        }
    };

    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');
    const chatMessages = document.getElementById('chatMessages');

    function addMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = sender === 'raphael' ? `[Raphael] ${text}` : `[TÚ] ${text}`;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function askRaphael(userQuestion) {
        if (!apiKey) {
            addMessage('raphael', "ERROR: No se ha configurado API key. Guárdela en el campo inferior.");
            return;
        }
        addMessage('user', userQuestion);
        addMessage('raphael', "Procesando...");
        const loadingMsg = chatMessages.lastChild;
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: 'Eres Raphael, un núcleo analítico sin emociones, estilo Danganronpa. Responde de forma directa, fría, sin cortesía. Usa "Aviso.", "Respuesta.", "Alerta." cuando corresponda. No uses saludos ni despedidas.' },
                        { role: 'user', content: userQuestion }
                    ],
                    temperature: 0.7
                })
            });
            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || `HTTP ${response.status}`);
            }
            const data = await response.json();
            const reply = data.choices[0].message.content;
            loadingMsg.remove(); // eliminar el "Procesando..."
            addMessage('raphael', reply);
        } catch (err) {
            loadingMsg.remove();
            addMessage('raphael', `Alerta. Error de conexión con API: ${err.message}`);
        }
    }

    sendBtn.onclick = () => {
        const question = chatInput.value.trim();
        if (!question) return;
        chatInput.value = '';
        askRaphael(question);
    };
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
</script>
</body>
</html>
